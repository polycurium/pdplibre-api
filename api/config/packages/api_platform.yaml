api_platform:
    title: PDPLibre API
    version: 0.1.0

    # Mercure integration, remove if unwanted
    mercure:
        include_type: true
    # Good defaults for REST APIs
    defaults:
        stateless: true
        cache_headers:
            vary: ['Content-Type', 'Authorization', 'Origin']
    formats:
        json: ["application/json"]
        multipart: ["multipart/form-data"]
